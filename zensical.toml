[project]
site_name = "翻译工具百科"
site_description = "本百科的作用是普及翻译思想及视频翻译工具的理解和使用"
site_author = "QZCrane"

validation = false

repo_url = "https://github.com/QZCrane7021/TranslationToolsWiki"
repo_name = "TranslationToolsWiki"


site_url = "http://qzcrane7021.github.io/TranslationToolsWiki"
copyright = """
CC BY-SA 4.0 2026 QZCrane
"""

extra_css = ["assets/style.css"]
extra_javascript = ["assets/script.js"]


nav = [
    {"基本信息" = [
        "general/index.md",
        "general/why-we-translate-videos.md",
        "general/general-workflow.md"
    ]},
    {"翻译的原则" = [
        "translation-principles/index.md",
        "translation-principles/streaming-media-translation.md",
        "translation-principles/about-using-ai.md",
        "translation-principles/appendix-translate-tone.md",
        "translation-principles/appendix-westernised-chinese.md"
    ]},
    {"Github" = [
        "github/index.md"
    ]},
    {"Watt Toolkit" = [
        "watt-toolkit/index.md"
    ]},
    {"VPN" = [
        "vpn/index.md"
    ]},
    {"yt-dlp" = [
        "yt-dlp/index.md"
    ]},
    {"VideoCaptioner" =[
        "video-captioner/index.md"
    ]},
    {"Aegisub" =[
        "aegisub/index.md"
    ]},
    {"Davinci Resolve" =[
        "davinci-resolve/index.md"
    ]},
    {"上传视频" = [
        "upload-video/index.md"
    ]}
]

# 正确：使用TOML数组表[[ ]]定义preview配置
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.blocks.caption]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji" 
emoji_generator = "zensical.extensions.emoji.to_svg"
[[project.markdown_extensions.zensical.extensions.preview.configurations]]
# 要开启预览的目标页面（你的原配置）
targets.include = [
    
]

[project.theme]
favicon = "assets/favicon.png"
language = "zh"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.tabs",
    "navigation.path",
    "navigation.top",
    "navigation.tracking",
    "navigation.tabs.sticky",
    "search.highlight",
    "toc.follow",
]

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "切换到浅色模式"
primary = "light blue"
accent = "light blue"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "切换到深色模式"
primary = "light blue"
accent = "light blue"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "切换到系统适应"
primary = "light blue"
accent = "light blue"

[project.theme.icon]
repo = "fontawesome/brands/github"
logo = "lucide/languages"